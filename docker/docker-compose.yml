services:

  db:
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_PASSWORD: myPassword@1234
      POSTGRES_USER: pb_user
      POSTGRES_DB: pb_database

  adminer:
    image: adminer
    restart: always
    ports:
      - 12300:8080